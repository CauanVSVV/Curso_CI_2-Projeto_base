name: Go

on:
  push:
    branches: [ '*' ]
  pull_request:
    branches: [ '*' ]

jobs:

  test:
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        go_version: ['1.18', '1.17', '>=1.18']
        os: ['ubuntu-latest', 'ubuntu-18.04']

    steps:
    - uses: actions/checkout@v3

    - name: Set up Go
      uses: actions/setup-go@v3
      with:
        go-version: ${{ matrix.go_version }}

    - name: Clean volumes
      run: docker compose down -v

    - name: Create-DB
      run: docker compose up -d

    - name: Wait-DB
      run: |
        for i in {1..30}; do
          if docker exec $(docker compose ps -q postgres) pg_isready -U root; then
            echo "Postgres is ready!"
            exit 0
          fi
          sleep 2
        done
        echo "Postgres failed to start"
        docker compose logs postgres
        exit 1

    - name: Test
      run: go test -v main_test.go 

  build:
    needs: test
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: ['ubuntu-latest', 'ubuntu-18.04']

    steps:
    - uses: actions/checkout@v3

    - name: Build
      run: go build -v main.go